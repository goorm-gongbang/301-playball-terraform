#############################################
# Common Environment Configuration
#############################################

environment: common
project_name: goormgb
aws_region: ap-northeast-2
domain_name: playball.one

#############################################
# CloudTrail
#############################################
cloudtrail:
  enabled: true
  s3_key_prefix: cloudtrail
  log_retention_days: 90

#############################################
# Security Events (EventBridge → Discord)
#############################################
security_events:
  enabled: true
  discord_secret_name: "staging/monitoring/discord-webhook-alerts"
  discord_username: "goormgb-security-bot"
  critical_mention_text: "@개발팀 @admins"

#############################################
# Audit Events (EventBridge → Discord + S3)
#############################################
audit_events:
  enabled: true
  summary_prefix: "lifecycle-expiration-summary"
  discord_secret_name: "staging/monitoring/discord-webhook-alerts"
  discord_username: "goormgb-audit-bot"
  critical_mention_text: "@개발팀 @admins"
  monitored_buckets:
    - goormgb-backup
    - goormgb-audit-logs
    - goormgb-archive
    - goormgb-ai-data
    - goormgb-ai-backup

#############################################
# Observability Storage Lifecycle
#############################################
observability_lifecycle:
  goormgb-staging-loki:
    rule_id: "expiry-7days"
    expiration_days: 7
  goormgb-staging-tempo:
    rule_id: "expiry-7days"
    expiration_days: 7
  goormgb-staging-thanos:
    rule_id: "expiry-14days"
    expiration_days: 14
  goormgb-prod-loki:
    rule_id: "expiry-90days"
    expiration_days: 90
    transition_days: 30
    transition_storage: "GLACIER"
  goormgb-prod-tempo:
    rule_id: "expiry-90days"
    expiration_days: 90
    transition_days: 30
    transition_storage: "GLACIER"
  goormgb-prod-thanos:
    rule_id: "expiry-180days"
    expiration_days: 180
    transition_days: 90
    transition_storage: "GLACIER"

#############################################
# IAM
#############################################
iam:
  cn_members:
    ash: {}
    "7eehy3": {}
    wonny: {}
